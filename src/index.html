<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crownline Vale</title>
    <link rel="icon" href="../build/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main id="game-shell" aria-label="Crownline Vale game">
      <canvas id="game" width="1280" height="720"></canvas>

      <section id="hud" aria-live="polite">
        <div class="hud-group">
          <span class="hud-label">Day</span>
          <strong id="day">1</strong>
        </div>
      </section>

      <section id="menu" class="overlay" hidden>
        <h1>Crownline Vale</h1>
        <div class="menu-actions">
          <button id="resume" type="button">Resume</button>
          <button id="restart" type="button">New Reign</button>
        </div>
      </section>

      <div id="buttons">
        <button id="pause" class="icon-button" type="button" aria-label="Pause" title="Pause"></button>
      </div>
    </main>

    <script src="./game-core.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
